---
layout: default
---
<article class="post story-page flush-top">
  <header class="major page-hero">
    <p class="eyebrow">News</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.date | date: "%B %d, %Y" }}</p>
  </header>
  {% if page.image %}
  <div class="image main hero-media">
    <img src="{{ page.image | absolute_url }}" alt="{{ page.title }}" />
  </div>
  {% endif %}
  <div class="rich-copy">
    {{ content }}
  </div>
</article>
