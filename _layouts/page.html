---
layout: default
---
<section class="post page-shell">
  {% if page.title %}
  <header class="major page-hero">
    <p class="eyebrow">{{ page.eyebrow | default: "Foley Lab" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p>{{ page.description }}</p>
    {% endif %}
  </header>
  {% endif %}
  {{ content }}
</section>
